<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>会员兑换后台</title><link rel="stylesheet" href="/commerce.css"></head><body><main><div class="top"><a href="/membership.html">← 返回会员中心</a><button id="refresh">刷新记录</button></div><section class="hero"><small>ADMIN CONSOLE</small><h1>会员兑换后台</h1><p>确认客户已在小红书或闲鱼付款后，为每位客户生成独立的一次性兑换链接。</p></section><section class="card"><h2>截图自动填写</h2><p class="muted">上传小红书或闲鱼订单截图，图片只在当前浏览器识别，不会上传服务器。首次使用可能需要等待十几秒。</p><label class="ocr-upload">选择订单截图<input id="orderScreenshot" type="file" accept="image/png,image/jpeg,image/webp"></label><img id="ocrPreview" class="ocr-preview hidden" alt="订单截图预览"><div id="ocrProgress" class="notice hidden"></div><details id="ocrDetails" class="hidden"><summary>查看识别文字</summary><pre id="ocrText"></pre></details></section><section class="card"><h2>生成专属链接</h2><form id="createForm" class="admin-form"><label class="field">会员套餐<select id="plan"><option value="monthly">月度会员 · 最多6人</option><option value="premium">高级会员 · 最多20人</option></select></label><label class="field">会员天数<input id="days" type="number" min="1" max="365" value="30"></label><label class="field">订单来源<select id="source"><option value="xiaohongshu">小红书</option><option value="xianyu">闲鱼</option><option value="offline">线下</option><option value="other">其他</option></select></label><label class="field">平台订单号<input id="platformOrderId" maxlength="60" placeholder="建议填写，方便售后核对"></label><label class="field">客户备注<input id="customerNote" maxlength="100" placeholder="例如：小红书昵称 / 购买人姓名"></label><button class="primary wide" type="submit">生成一次性兑换链接</button></form><div id="generated" class="generated hidden"><b>链接已生成</b><textarea id="replyText" rows="6" readonly></textarea><div class="actions"><button id="copyReply" class="primary">复制快捷回复</button><button id="copyLink">只复制链接</button></div><p class="muted">链接72小时内有效，客户成功兑换后立即失效。</p></div></section><section class="card"><h2>兑换记录</h2><div id="redemptions"><p class="muted">正在加载…</p></div></section></main><script src="https://cdn.jsdelivr.net/npm/tesseract.js@6/dist/tesseract.min.js"></script><script src="/admin.js"></script></body></html>
