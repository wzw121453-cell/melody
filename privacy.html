<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>隐私政策</title><link rel="stylesheet" href="/commerce.css"></head><body><main><div class="top"><a href="/membership.html">← 返回</a></div><article class="card"><h1>隐私政策</h1><p>更新日期：2026年7月20日</p><h2>我们收集的信息</h2><p>为提供账户、订单和一起听功能，我们处理手机号、昵称、加密后的密码、订单记录、付款凭证、房间互动和必要的技术日志。</p><h2>使用目的</h2><p>信息用于身份验证、会员开通、订单审核、服务安全、故障排查和客户支持，不用于出售用户信息。</p><h2>保存与安全</h2><p>密码采用不可逆哈希保存。付款截图仅限订单本人和管理员查看。达到法定或业务保存期限后应删除或匿名化。</p><h2>用户权利</h2><p>用户可联系平台申请查询、更正或删除个人信息；法律要求保留的交易记录除外。</p><h2>第三方服务</h2><p>服务可能使用云托管、微信和小宇宙公开链接。第三方服务适用其自身隐私规则。</p></article></main></body></html>
