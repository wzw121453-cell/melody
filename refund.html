<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>退款说明</title><link rel="stylesheet" href="/commerce.css"></head><body><main><div class="top"><a href="/membership.html">← 返回</a></div><article class="card"><h1>退款说明</h1><p>更新日期：2026年7月20日</p><h2>未开通订单</h2><p>付款后尚未审核开通的订单，如核实到账，可申请原路退款或取消审核。</p><h2>已开通会员</h2><p>会员开通后7日内且未创建或使用一起听房间，可申请退款；已经实际使用会员权益的订单原则上不支持无理由退款，法律另有规定的除外。</p><h2>服务故障</h2><p>因平台自身连续重大故障导致会员权益无法使用，可根据影响时间延期或协商退款。</p><h2>处理方式</h2><p>退款需提供订单号和付款记录。管理员确认后在后台标记退款，并通过原收款渠道处理。到账时间以微信和银行处理为准。</p><p class="notice">正式经营前应根据实际主体、联系方式和适用法律请专业人士审阅本说明。</p></article></main></body></html>
